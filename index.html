<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشاط المحاضرة التفاعلي: برامج تعليم التفكير</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.5s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <!-- React root node -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Inline Icons (Replacements for lucide-react) ---
        const IconBase = ({ d, children, className = "w-6 h-6" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d && <path d={d} />}
                {children}
            </svg>
        );

        const BrainCircuit = ({ className }) => <IconBase className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M9 13a4.5 4.5 0 0 0 3-4"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M12 13h4"/><path d="M12 18h6a2 2 0 0 1 2 2v1"/><path d="M12 8h8"/><path d="M16 8V5a2 2 0 0 1 2-2"/><circle cx="16" cy="13" r="2"/><circle cx="18" cy="3" r="2"/><circle cx="20" cy="21" r="2"/><circle cx="20" cy="8" r="2"/></IconBase>;
        const Play = ({ className }) => <IconBase className={className}><polygon points="6 3 20 12 6 21 6 3"/></IconBase>;
        const Target = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></IconBase>;
        const CheckCircle2 = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconBase>;
        const XCircle = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></IconBase>;
        const ArrowRight = ({ className }) => <IconBase className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconBase>;
        const ArrowLeft = ({ className }) => <IconBase className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></IconBase>;
        const RefreshCcw = ({ className }) => <IconBase className={className}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></IconBase>;
        const BookOpen = ({ className }) => <IconBase className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconBase>;
        const Crown = ({ className }) => <IconBase className={className}><path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.956-.734L2.02 6.02a.5.5 0 0 1 .798-.518l4.276 3.664a1 1 0 0 0 1.516-.294z"/><path d="M5 21h14"/></IconBase>;
        const PenTool = ({ className }) => <IconBase className={className}><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></IconBase>;

        // --- Audio Helper for Interactive Sounds ---
        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);

                if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'success') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'error') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                console.log("Audio not supported");
            }
        };

        function App() {
            const [step, setStep] = useState('login'); // login, selectMode, quiz, result
            const [userName, setUserName] = useState('');
            const [mode, setMode] = useState(''); // 'pre' or 'post'
            
            // Quiz state
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showExplanation, setShowExplanation] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);

            // أسئلة الاختبار القبلي (نشاط التهيئة)
            const preTestQuestions = [
                {
                    q: 'ما هو الهدف الأساسي من برامج تعليم التفكير؟',
                    options: ['تدريس محتوى دراسي وحفظه', 'تعليم مهارات التفكير وتطوير العمليات العقلية', 'تقليل عدد الساعات الدراسية', 'الاستغناء عن المعلم'],
                    answer: 1,
                    explanation: 'الهدف الرئيسي هو تعليم مهارات التفكير وتطوير العمليات المعرفية، وليس مجرد تدريس محتوى دراسي محدد.'
                },
                {
                    q: 'في قبعات التفكير الست، ما هي القبعة التي تهتم بالمشاعر والعواطف والانطباعات؟',
                    options: ['القبعة البيضاء', 'القبعة السوداء', 'القبعة الحمراء', 'القبعة الزرقاء'],
                    answer: 2,
                    explanation: 'القبعة الحمراء مخصصة للتفكير العاطفي والتعبير عن المشاعر والانطباعات تجاه الموقف حتى دون وجود مبررات منطقية.'
                },
                {
                    q: 'برنامج الكورت (CORT) يتكون من ستة أجزاء، ما هو الهدف من "الكورت الأول"؟',
                    options: ['العمل والتنفيذ', 'التفاعل والمناقشة', 'تنظيم التفكير', 'توسيع مجال الإدراك والتفكير'],
                    answer: 3,
                    explanation: 'الكورت الأول يهدف إلى "توسيع مجال الإدراك" والنظر إلى الموقف من جميع جوانبه قبل اتخاذ أي قرار.'
                },
                {
                    q: 'وفقاً لبرنامج الذكاءات المتعددة لجاردنر، القدرة على تصوير العالم داخلياً وتذكر الأماكن تُعرف بـ:',
                    options: ['الذكاء البصري المكاني', 'الذكاء الجسمي الحركي', 'الذكاء المنطقي', 'الذكاء الطبيعي'],
                    answer: 0,
                    explanation: 'الذكاء البصري المكاني هو القدرة على تصوير المكان داخلياً، وتذكر الأماكن والخرائط الذهنية وتتبع الأثر.'
                },
                {
                    q: 'في استراتيجية سكامبر (SCAMPER)، إلى ماذا يرمز حرف الـ (C - Combine)؟',
                    options: ['التبديل', 'الدمج', 'التعديل', 'الحذف'],
                    answer: 1,
                    explanation: 'يرمز حرف الـ C إلى Combine (الدمج)، وهو الجمع بين فكرتين أو عنصرين لإنتاج فكرة جديدة تختلف في خصائصها.'
                }
            ];

            // أسئلة الاختبار البعدي (نشاط ختامي)
            const postTestQuestions = [
                {
                    q: 'أي من الذكاءات التالية يعني قدرة الفرد على التعمق داخل نفسه ومعرفة حدود قدراته؟',
                    options: ['الذكاء الاجتماعي', 'الذكاء اللغوي', 'الذكاء الذاتي', 'الذكاء المنطقي'],
                    answer: 2,
                    explanation: 'الذكاء الذاتي يعني تعمق الفرد داخل نفسه، ومعرفة حدود قدراته وسماته التي تميزه عن غيره.'
                },
                {
                    q: 'في استراتيجية القبعات الست، ماذا تمثل القبعة الخضراء؟',
                    options: ['التفكير العاطفي', 'التفكير الناقد', 'التفكير الإبداعي والمقترحات', 'جمع الحقائق والأرقام'],
                    answer: 2,
                    explanation: 'القبعة الخضراء ترمز للنمو والابتكار، وهي مخصصة للتفكير الإبداعي والبحث عن البدائل (ماذا لو؟).'
                },
                {
                    q: 'من المعوقات (النفسية) التي تحد من التفكير المنتج:',
                    options: ['نقص المهارات التعليمية', 'نقص الدعم الاجتماعي', 'الخوف من الفشل وانخفاض الثقة بالنفس', 'القصور في المعرفة'],
                    answer: 2,
                    explanation: 'الخوف من الفشل وانخفاض الثقة بالنفس يُعدان من أبرز المعوقات "النفسية" التي تمنع الفرد من المخاطرة وطرح أفكار مبتكرة.'
                },
                {
                    q: 'التفكير الذي يجمع بين التفكير الإبداعي (لتوليد الحلول) والتفكير الناقد (لتقييمها) يسمى:',
                    options: ['التفكير النمطي', 'التفكير المنتج', 'الذكاء اللغوي', 'الالاستبصار'],
                    answer: 1,
                    explanation: 'التفكير المنتج يدمج بين إنتاج الأفكار الإبداعية وإصدار الأحكام الناقدة عليها للوصول لنتائج عملية وإيجابية.'
                },
                {
                    q: 'في نموذج جيلفورد لحل المشكلات، ماذا يحدث إذا لم يجد الفرد حلاً جاهزاً في ذاكرته عند مواجهة مشكلة؟',
                    options: ['يستسلم ويتوقف عن التفكير', 'ينتقل إلى التفكير المتشعب لتوليد بدائل جديدة', 'يعتمد على التفكير العاطفي', 'يتجاهل المثير الخارجي'],
                    answer: 1,
                    explanation: 'في نموذج جيلفورد، إذا لم يجد الفرد حلاً جاهزاً في مخزونه المعرفي، فإنه ينتقل لمرحلة "التفكير المتشعب" لتوليد بدائل وحلول إبداعية جديدة.'
                }
            ];

            const handleStart = (e) => {
                e.preventDefault();
                if (userName.trim()) {
                    playSound('click');
                    setStep('selectMode');
                }
            };

            const selectMode = (selected) => {
                playSound('click');
                setMode(selected);
                setStep('quiz');
                setCurrentQuestion(0);
                setScore(0);
                setShowExplanation(false);
            };

            const currentQuestionsSet = mode === 'pre' ? preTestQuestions : postTestQuestions;
            const currentTitle = mode === 'pre' ? 'الاختبار القبلي (نشاط تهيئة)' : 'الاختبار البعدي (نشاط ختامي)';

            const handleAnswer = (index) => {
                if (showExplanation) return;
                
                const correct = index === currentQuestionsSet[currentQuestion].answer;
                setIsCorrect(correct);
                setShowExplanation(true);
                
                if (correct) {
                    playSound('success');
                    setScore(score + 1);
                } else {
                    playSound('error');
                }
            };

            const nextQuestion = () => {
                playSound('click');
                setShowExplanation(false);
                if (currentQuestion + 1 < currentQuestionsSet.length) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    setStep('result');
                }
            };

            const resetActivity = () => {
                playSound('click');
                setStep('selectMode');
            };

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    <div className="max-w-3xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                        
                        {/* Header */}
                        <div className="bg-emerald-600 p-6 text-white text-center">
                            <h1 className="text-2xl md:text-3xl font-bold mb-2 flex items-center justify-center gap-2">
                                <BrainCircuit className="w-8 h-8" />
                                برامج تعليم التفكير: طبيعتها وانواعها المختلفة
                            </h1>
                            <p className="text-emerald-100">تطبيق تفاعلي للمفاهيم الأساسية</p>
                        </div>

                        <div className="p-4 md:p-8">
                            {/* STEP 1: LOGIN */}
                            {step === 'login' && (
                                <div className="flex flex-col items-center animate-zoom-in">
                                    <BookOpen className="w-20 h-20 text-emerald-500 mb-6" />
                                    <h2 className="text-2xl font-bold mb-6 text-center">أهلاً بك في منصة التعلم التفاعلي</h2>
                                    <form onSubmit={handleStart} className="w-full max-w-md flex flex-col gap-4">
                                        <input
                                            type="text"
                                            placeholder="الرجاء إدخال اسمك للبدء..."
                                            className="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all text-lg"
                                            value={userName}
                                            onChange={(e) => setUserName(e.target.value)}
                                            required
                                        />
                                        <button
                                            type="submit"
                                            disabled={!userName.trim()}
                                            className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 text-white font-bold py-4 rounded-xl transition-all flex justify-center items-center gap-2 text-lg"
                                        >
                                            ابدأ النشاط <Play className="w-5 h-5" />
                                        </button>
                                    </form>
                                </div>
                            )}

                            {/* STEP 2: SELECT MODE */}
                            {step === 'selectMode' && (
                                <div className="flex flex-col items-center animate-fade-in">
                                    <h2 className="text-2xl font-bold mb-2 text-center">أهلاً بك يا {userName}!</h2>
                                    <p className="text-slate-500 mb-8 text-center">اختر نوع النشاط الذي تود القيام به الآن:</p>
                                    
                                    <div className="grid md:grid-cols-2 gap-6 w-full">
                                        <button
                                            onClick={() => selectMode('pre')}
                                            className="flex flex-col items-center p-8 border-2 border-blue-100 bg-blue-50 hover:bg-blue-100 hover:border-blue-300 rounded-2xl transition-all group"
                                        >
                                            <PenTool className="w-16 h-16 text-blue-500 mb-4 group-hover:scale-110 transition-transform" />
                                            <h3 className="text-xl md:text-2xl font-bold text-blue-700 mb-2">نشاط تهيئة</h3>
                                            <p className="text-blue-600/80 text-center">اختبار قبلي لقياس المعرفة المبدئية بالمفاهيم</p>
                                        </button>

                                        <button
                                            onClick={() => selectMode('post')}
                                            className="flex flex-col items-center p-8 border-2 border-emerald-100 bg-emerald-50 hover:bg-emerald-100 hover:border-emerald-300 rounded-2xl transition-all group"
                                        >
                                            <Target className="w-16 h-16 text-emerald-500 mb-4 group-hover:scale-110 transition-transform" />
                                            <h3 className="text-xl md:text-2xl font-bold text-emerald-700 mb-2">نشاط ختامي</h3>
                                            <p className="text-emerald-600/80 text-center">اختبار بعدي لتقييم مدى استيعاب محتوى المحاضرة</p>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* STEP 3: QUIZ ACTIVITY */}
                            {step === 'quiz' && (
                                <div className="flex flex-col animate-fade-in">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b pb-4 gap-4">
                                        <div>
                                            <h2 className="text-xl md:text-2xl font-bold text-slate-800">{currentTitle}</h2>
                                            <p className="text-slate-500">السؤال {currentQuestion + 1} من {currentQuestionsSet.length}</p>
                                        </div>
                                        <div className="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                                            <div className="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg font-bold">
                                                النقاط: {score}
                                            </div>
                                            <button onClick={resetActivity} className="p-2 text-slate-400 hover:text-emerald-600 bg-slate-100 rounded-lg transition-colors" title="العودة للقائمة">
                                                <ArrowRight className="w-6 h-6" />
                                            </button>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-200 mb-6">
                                        <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-6 leading-relaxed">
                                            {currentQuestionsSet[currentQuestion].q}
                                        </h3>
                                        <div className="flex flex-col gap-3">
                                            {currentQuestionsSet[currentQuestion].options.map((option, idx) => {
                                                let btnClass = "text-right p-4 rounded-xl border-2 transition-all font-medium text-base md:text-lg ";
                                                
                                                if (!showExplanation) {
                                                    btnClass += "border-slate-200 bg-white hover:border-emerald-400 hover:bg-emerald-50 cursor-pointer";
                                                } else {
                                                    if (idx === currentQuestionsSet[currentQuestion].answer) {
                                                        btnClass += "border-emerald-500 bg-emerald-100 text-emerald-800"; // Correct
                                                    } else {
                                                        btnClass += "border-slate-200 bg-slate-100 text-slate-400 opacity-60 cursor-not-allowed"; // Wrong/Unselected
                                                    }
                                                }

                                                return (
                                                    <button
                                                        key={idx}
                                                        onClick={() => handleAnswer(idx)}
                                                        disabled={showExplanation}
                                                        className={btnClass}
                                                    >
                                                        {option}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Feedback Box */}
                                    {showExplanation && (
                                        <div className={`p-4 md:p-6 rounded-xl border-2 mb-6 animate-slide-up ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}`}>
                                            <div className="flex items-start gap-3">
                                                {isCorrect ? <CheckCircle2 className="w-6 h-6 text-emerald-600 shrink-0 mt-1" /> : <XCircle className="w-6 h-6 text-red-600 shrink-0 mt-1" />}
                                                <div>
                                                    <h4 className={`font-bold text-lg mb-1 ${isCorrect ? 'text-emerald-800' : 'text-red-800'}`}>
                                                        {isCorrect ? 'إجابة صحيحة' : 'إجابة غير دقيقة'}
                                                    </h4>
                                                    <p className={`text-sm md:text-base ${isCorrect ? 'text-emerald-700' : 'text-red-700'}`}>
                                                        {currentQuestionsSet[currentQuestion].explanation}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {showExplanation && (
                                        <button
                                            onClick={nextQuestion}
                                            className="self-end bg-slate-800 hover:bg-slate-700 text-white px-8 py-3 rounded-xl font-bold transition-colors flex items-center gap-2"
                                        >
                                            {currentQuestion + 1 === currentQuestionsSet.length ? 'إظهار النتيجة' : 'السؤال التالي'}
                                            <ArrowLeft className="w-5 h-5" />
                                        </button>
                                    )}
                                </div>
                            )}

                            {/* STEP 4: RESULTS */}
                            {step === 'result' && (
                                <div className="flex flex-col items-center text-center animate-zoom-in py-8">
                                    <div className="relative mb-6">
                                        <Crown className="w-24 h-24 text-yellow-400" />
                                        <div className="absolute -bottom-2 -right-2 bg-emerald-500 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold border-4 border-white">
                                            {score}
                                        </div>
                                    </div>
                                    
                                    <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-2">اكتمل التقييم، {userName}</h2>
                                    <p className="text-lg text-slate-600 mb-8">
                                        حصلت في هذا النشاط على <strong className="text-emerald-600 text-xl">{score}</strong> من <strong className="text-emerald-600 text-xl">{currentQuestionsSet.length}</strong>.
                                    </p>

                                    <div className="bg-blue-50 border border-blue-100 p-6 rounded-2xl max-w-md w-full mb-8">
                                        <h3 className="font-bold text-blue-800 mb-2">رسالة الختام</h3>
                                        <p className="text-blue-600 text-sm leading-relaxed">
                                            سواء كان هذا اختباراً قبلياً لتقييم مستواك المبدئي، أو بعدياً لقياس ما تعلمته، فإن الهدف الأساسي هو تحديد الفجوات المعرفية والعمل على تحسينها تماماً كما نهدف من خلال برامج تعليم التفكير إلى بناء عقول قادرة على الإبداع وحل المشكلات.
                                        </p>
                                    </div>

                                    <div className="flex flex-col sm:flex-row gap-4 w-full justify-center">
                                        <button
                                            onClick={() => selectMode(mode)}
                                            className="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-6 py-3 rounded-xl font-bold transition-colors flex justify-center items-center gap-2"
                                        >
                                            <RefreshCcw className="w-5 h-5" /> إعادة الاختبار
                                        </button>
                                        <button
                                            onClick={resetActivity}
                                            className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl font-bold transition-colors flex justify-center"
                                        >
                                            العودة للقائمة
                                        </button>
                                    </div>
                                </div>
                            )}
                            
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
